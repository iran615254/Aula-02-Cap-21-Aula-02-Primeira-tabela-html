<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

<style>
body    {
        font-family: Arial, Helvetica, sans-serif;
    }
   
    
    table {
        /* Largura da colunas */
    width: 600px;
    /* Para unir as linhas entre as celulas */
    border-collapse: collapse;
    }

    tr.linha {
        background-color: gray;
    }

    td ,th { 
        border: 1px solid black;
        padding: 12px;
    }

    td.dado {
        background-color: rgb(153, 153, 146);
    }

</style>
</head>

<body>
<h1>Minha primeira tabela</h1>
<!-- É utilzado para criar organização de dados -->
<!-- 
    Hierarquia de tabelas (Simples)
    <table> Table = tabela
        <tr> Table Row = Linha da tabela
        <th> Table Header = cabeçalho 
        <td> tabela Data = dado da tabela Data = dado da tabela
    </table>
-->
<table>
  
    <tr class="linha"> <!-- Primeira linha -->
        <th>Nome do Produto</th>
        <th>Categoria</th>
        <th>Preço</th>
        <th>Estoque</th>
    </tr>
    <tr> <!-- Segunda linha -->
        <td>Camiseta</td>
        <td>Vesuário</td>
        <td>49,90</td>
        <td>20</td>
    </tr>
    <tr> <!-- Terceira linha -->
        <td>Notebook</td>
        <td>Eletrônicos</td>
        <td>3.500,00</td>
        <td>5</td>
    </tr>
    <tr> <!-- Quarta linha -->
        <td>Café Gourmet</td>
        <td>Alimentos</td>
        <td>29,90</td>
        <td>15</td>
    </tr>
</table=>
    
</body>
</html>
